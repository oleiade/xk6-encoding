name: lint

on: push

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.1
